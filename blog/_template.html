<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <meta name="description" content="{{meta_description}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%230d1117'/><text y='72' x='50' text-anchor='middle' font-size='60'>⚙</text></svg>">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            --bg:             #0d1117;
            --surface:        #161b22;
            --surface-raised: #21262d;
            --border:         #30363d;
            --border-bright:  #484f58;
            --text:           #e6edf3;
            --text-dim:       #8b949e;
            --text-muted:     #6e7681;
            --green:          #3fb950;
            --blue:           #58a6ff;
            --orange:         #f0883e;
            --font:           'Space Grotesk', 'Segoe UI', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Article layout ───────────────────────────── */
        .post-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 64px 32px 120px;
        }

        /* ── Meta block ───────────────────────────────── */
        .post-meta { margin-bottom: 32px; }

        .post-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 3px;
            margin-bottom: 14px;
        }
        .post-tag--green { color: var(--green); border: 1px solid var(--green); }
        .post-tag--blue  { color: var(--blue);  border: 1px solid var(--blue);  }

        .post-wrap h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--text);
            margin-bottom: 10px;
        }

        .post-subtitle {
            font-size: 1.05rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .post-byline { font-size: 0.82rem; color: var(--text-muted); }

        /* ── Body copy ────────────────────────────────── */
        .post-body {
            font-size: 1rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .post-body p { margin-bottom: 1.4em; }

        .post-body h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            margin: 2.5em 0 0.75em;
            padding-top: 0.5em;
            border-top: 1px solid var(--border);
        }

        .post-body h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin: 1.8em 0 0.5em;
        }

        .post-body strong { color: var(--text); font-weight: 600; }
        .post-body em     { color: var(--text); font-style: italic; }

        .post-body ol,
        .post-body ul {
            padding-left: 1.5em;
            margin-bottom: 1.4em;
        }
        .post-body li { margin-bottom: 0.5em; }

        .post-body hr { display: none; }

        /* ── Embedded HTML blocks (blog/html-blocks/) ── */
        .post-html-block {
            margin: 2em 0;
            clear: both;
        }

        .post-body .post-html-block > :first-child { margin-top: 0; }
        .post-body .post-html-block > :last-child  { margin-bottom: 0; }

        /* ── Blockquotes → pattern callouts ───────────── */
        .post-body blockquote {
            border-left: 3px solid var(--orange);
            padding: 4px 0 4px 20px;
            margin: 1.8em 0;
        }

        .post-body blockquote p {
            margin-bottom: 0.6em;
            color: var(--text-dim);
        }
        .post-body blockquote p:last-child { margin-bottom: 0; }

        /* ── Tables ───────────────────────────────────── */
        .post-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
            margin: 1.6em 0 2em;
            overflow-x: auto;
            display: block;
        }

        .post-body th {
            text-align: left;
            font-weight: 600;
            color: var(--text);
            font-size: 0.78rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-bright);
            white-space: nowrap;
        }

        .post-body td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            color: var(--text-dim);
        }

        .post-body tr:last-child td { border-bottom: none; }
        .post-body td strong { color: var(--text); }

        .post-body tr.highlight td {
            background: rgba(88, 166, 255, 0.06);
            color: var(--text);
        }
        .post-body tr.highlight td strong { color: var(--blue); }

        /* ── CTA block ────────────────────────────────── */
        .post-cta {
            margin-top: 3em;
            padding: 28px 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .post-cta p {
            margin-bottom: 16px;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .cta-links { display: flex; gap: 12px; flex-wrap: wrap; }

        .btn {
            padding: 10px 20px;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            text-decoration: none;
        }

        .btn-primary { background: var(--blue); color: #0d1117; }
        .btn-primary:hover { background: #79bcff; text-decoration: none; }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-bright);
        }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); text-decoration: none; }

        /* ── Footer ───────────────────────────────────── */
        .post-footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 1px solid var(--border);
            font-size: 0.88rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 640px) {
            .post-wrap h1 { font-size: 1.7rem; }
            .post-wrap { padding: 40px 20px 80px; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="header-container">
        <div class="header-top">
            <a class="header-logo" href="../index.html">Duct Tape to COO</a>
            <nav class="header-nav">
                <a href="../diagnostic.html">Diagnostic</a>
                <a href="../wiki.html">Wiki</a>
                <a href="../skill-setup.html">Virtual COO</a>
                <a href="index.html" class="active">Blog</a>
            </nav>
        </div>
    </div>
</header>

<div class="post-wrap">

    <div class="post-meta">
        <span class="post-tag {{tag_class}}">{{tag_text}}</span>
        <h1>{{post_title}}</h1>
        <p class="post-subtitle">{{post_subtitle}}</p>
        <p class="post-byline">{{post_date}}</p>
    </div>

    <div class="post-body">
{{post_content}}
    </div>

{{cta_block}}

{{footer_block}}

</div>

</body>
</html>
