<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Working at…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9f9f8;
      font-family: Arial, -apple-system, sans-serif;
      color: #37352f;
      font-size: 11pt;
      line-height: 1.4;
    }

    /* ── Banner ─────────────────────────────────────────────────── */
    #banner {
      height: 28px;
      width: 100%;
    }

    /* ── Page ────────────────────────────────────────────────────── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 72px 72px;
      background: #fff;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #icon {
      font-size: 28pt;
      margin-top: 20px;
      margin-bottom: 6px;
      line-height: 1;
    }

    #title {
      font-size: 26pt;
      font-weight: 700;
      color: #37352f;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    #tagline {
      color: #787774;
      font-size: 11pt;
      margin-bottom: 28px;
      max-width: 520px;
    }

    /* ── Two-column layout ───────────────────────────────────────── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 30px;
      align-items: start;
    }

    /* ── Section headers ─────────────────────────────────────────── */
    .col h2 {
      font-size: 14pt;
      font-weight: 700;
      color: #37352f;
      padding-top: 16px;
      padding-bottom: 6px;
      border-bottom: 0.5px solid #e3e2e0;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .col h2:first-child {
      padding-top: 2px;
    }

    /* ── Nav items ───────────────────────────────────────────────── */
    .col ul {
      list-style: none;
      margin-bottom: 4px;
    }

    .col ul li {
      padding: 3px 0;
      font-size: 11pt;
      color: #37352f;
      line-height: 1.4;
    }

    /* Nested lists (sub-items) */
    .col ul ul {
      padding-left: 20px;
      margin-top: 2px;
    }

    /* Links inside nav items */
    .col ul li a {
      color: #37352f;
      text-decoration: none;
    }

    .col ul li a:hover {
      text-decoration: underline;
    }

    .col ul li a[href=""] {
      cursor: default;
    }

    /* Italic = placeholder / coming soon */
    .col ul li em {
      color: #9b9a97;
      font-style: normal;
    }

    /* ── Checkboxes (Bear-style task lists) ──────────────────────── */
    .col input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid #bfbeba;
      border-radius: 3px;
      margin-right: 7px;
      vertical-align: -2px;
      flex-shrink: 0;
      cursor: default;
      background: #fff;
      position: relative;
    }

    .col input[type="checkbox"]:checked {
      background: #37352f;
      border-color: #37352f;
    }

    .col input[type="checkbox"]:checked::after {
      content: "";
      display: block;
      width: 4px;
      height: 7px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      position: absolute;
      top: 1px;
      left: 4px;
      transform: rotate(45deg);
    }

    .col li.task-list-item {
      display: flex;
      align-items: flex-start;
      padding: 3px 0;
    }

    .col li.task-list-item input {
      margin-top: 3px;
    }

    /* Checked task item text — strike through */
    .col li.task-list-item:has(input:checked) {
      color: #9b9a97;
      text-decoration: line-through;
    }

    /* ── Featured content box ────────────────────────────────────── */
    .col blockquote {
      background: #f7f6f3;
      border: 1px solid #e3e2e0;
      border-radius: 4px;
      padding: 40px 16px;
      margin-top: 20px;
      text-align: center;
      color: #9b9a97;
    }

    .col blockquote p {
      color: #9b9a97;
      font-style: italic;
      font-size: 10pt;
    }

    /* ── Edit link ───────────────────────────────────────────────── */
    #edit-link {
      position: absolute;
      top: 36px;
      right: 20px;
      font-size: 9pt;
      color: #b7b5b0;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.7;
      transition: opacity 0.15s, color 0.15s;
    }

    #edit-link:hover {
      opacity: 1;
      color: #37352f;
    }

    .page-wrap {
      position: relative;
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .page { padding: 20px 24px 48px; }
      .columns { grid-template-columns: 1fr; }
      #edit-link { top: 8px; right: 10px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">
<div id="banner"></div>
<a id="edit-link" href="#" target="_blank" rel="noopener" style="display:none">
  <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
    <path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354zm.514 3.605-1.44-1.44-6.86 6.86-.367 1.281 1.281-.367z"/>
  </svg>
  Edit
</a>

<div class="page">
  <div id="icon"></div>
  <h1 id="title"></h1>
  <p id="tagline"></p>
  <div class="columns">
    <div id="col-left" class="col"></div>
    <div id="col-right" class="col"></div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>

function parseFrontmatter(text) {
  const norm = text.replace(/\r\n/g, '\n');
  const match = norm.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { meta: {}, body: norm };
  const meta = {};
  for (const line of match[1].split('\n')) {
    const kv = line.match(/^(\w+):\s*"?(.*?)"?\s*$/);
    if (kv) meta[kv[1]] = kv[2];
  }
  return { meta, body: match[2] };
}

marked.setOptions({ gfm: true, breaks: false });

const mdFile = (new URLSearchParams(location.search).get('page') || 'working-at') + '.md';

// Derive GitHub edit URL from GitHub Pages hostname
// e.g. aksie.github.io/ducttape-to-coo/templates/working-at.html
//   → github.com/aksie/ducttape-to-coo/edit/main/templates/working-at.md
(function buildEditLink() {
  const host = location.hostname;
  if (!host.endsWith('.github.io')) return;
  const owner = host.split('.')[0];
  const pathParts = location.pathname.split('/').filter(Boolean);
  const repo = pathParts[0];
  const pageDir = pathParts.slice(1, -1).join('/');
  const fullMdPath = pageDir ? pageDir + '/' + mdFile : mdFile;
  const editUrl = `https://github.com/${owner}/${repo}/edit/main/${fullMdPath}`;
  const link = document.getElementById('edit-link');
  link.href = editUrl;
  link.style.display = 'flex';
})();

fetch(mdFile)
  .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
  .then(raw => {
    const { meta, body } = parseFrontmatter(raw);

    // Banner color from frontmatter
    document.getElementById('banner').style.background = meta.color || '#9cb7a4';

    // Split into (header + left sections) and right sections
    const parts = body.split(/<!--\s*column-break\s*-->/);
    const leftPlusHeader = parts[0].trim();
    const rightMd = (parts[1] || '').trim();

    // Extract H1 line: "# 🏠 Working at [Company name]"
    const h1Match = leftPlusHeader.match(/^#[ \t]+(.+)$/m);
    const fullTitle = h1Match ? h1Match[1].trim() : '';

    // Split emoji from the rest of the title
    // Matches one or more emoji chars at the start
    const emojiMatch = fullTitle.match(/^([\p{Emoji}\u{1F3FB}-\u{1F3FF}\u{200D}\u{FE0F}]+)\s*/u);
    const icon      = emojiMatch ? emojiMatch[1] : '';
    const titleText = fullTitle.replace(emojiMatch ? emojiMatch[0] : '', '').trim();

    // Everything between the H1 and the first ## is the tagline paragraph
    const afterH1 = leftPlusHeader.replace(/^#[ \t]+.+$/m, '').trim();
    const firstH2pos = afterH1.search(/^##[ \t]/m);
    const taglineMd  = firstH2pos > 0 ? afterH1.slice(0, firstH2pos).trim() : '';
    const leftMd     = firstH2pos > 0 ? afterH1.slice(firstH2pos).trim() : afterH1;

    // Render tagline as plain text (strip any markdown)
    const taglineHtml = marked.parseInline(taglineMd);
    const tmp = document.createElement('div');
    tmp.innerHTML = taglineHtml;
    const taglineText = tmp.textContent;

    document.title = titleText || 'Working at…';
    document.getElementById('icon').textContent  = icon;
    document.getElementById('title').textContent = titleText;
    document.getElementById('tagline').textContent = taglineText;

    document.getElementById('col-left').innerHTML  = marked.parse(leftMd);
    document.getElementById('col-right').innerHTML = marked.parse(rightMd);
  })
  .catch(err => {
    document.querySelector('.page').innerHTML =
      `<p style="color:#9b9a97;padding-top:40px">Could not load <code>${mdFile}</code>: ${err.message}</p>`;
  });

</script>
</body>
</html>
